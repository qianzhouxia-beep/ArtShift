  <!-- Handle -->
  <path d="M260 220 C300 220 320 260 320 300 C320 340 300 370 260 370" stroke="#2C3E50" stroke-width="3" fill="none"/>
  <path d="M260 240 C290 240 305 270 305 300 C305 330 290 355 260 355" stroke="#2C3E50" stroke-width="1.5" fill="none"/>
  <!-- Print area -->
  <rect x="158" y="220" width="84" height="100" rx="8" fill="#E8ECF0" stroke="#D0D5DD" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="200" y="280" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#98A2B3">Your Design Here</text>
  <!-- Liquid fill -->
  <path d="M145 185 C145 170 200 160 200 160 C200 160 255 170 255 185" fill="#E8ECF0" opacity="0.4"/>
  <text x="200" y="480" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#475467" font-weight="600">Accent 11oz</text>
</svg>
