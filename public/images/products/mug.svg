<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <rect width="400" height="500" rx="24" fill="#F8F9FA"/>
  <ellipse cx="200" cy="470" rx="80" ry="10" fill="#000" opacity="0.08"/>
  <!-- Mug body -->
  <path d="M140 180 L140 360 C140 390 160 410 200 410 C240 410 260 390 260 360 L260 180" stroke="#2C3E50" stroke-width="3" fill="#fff"/>
