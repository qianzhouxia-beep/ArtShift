<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <rect width="400" height="500" rx="24" fill="#F8F9FA"/>
  <ellipse cx="200" cy="470" rx="100" ry="12" fill="#000" opacity="0.08"/>
  <!-- Trucker Cap - front view -->
  <!-- Crown -->
  <path d="M120 220 L120 280 C120 330 150 360 200 360 C250 360 280 330 280 280 L280 220" stroke="#2C3E50" stroke-width="3" fill="#fff"/>
  <!-- Brim/Visor -->
  <path d="M110 220 C90 240 60 250 45 265 C35 275 60 285 80 280 C100 275 120 260 130 245" stroke="#2C3E50" stroke-width="3" fill="#1A1A2E"/>
  <!-- Brim bottom -->
  <path d="M45 265 C35 275 60 285 80 280 C100 275 120 260 130 245" stroke="#2C3E50" stroke-width="2.5" fill="#2C2C3E"/>
  <!-- Mesh back area -->
  <path d="M280 220 L280 280 C280 330 250 360 200 360" stroke="#2C3E50" stroke-width="2" fill="#D0D5DD" opacity="0.5"/>
  <!-- Top panels -->
  <path d="M120 220 L200 160 L280 220" stroke="#2C3E50" stroke-width="2.5" fill="#F5F5F5"/>
  <path d="M120 220 L200 160" stroke="#2C3E50" stroke-width="1.5" fill="none"/>
  <path d="M280 220 L200 160" stroke="#2C3E50" stroke-width="1.5" fill="none"/>
  <!-- Snapback closure -->
  <rect x="193" y="340" width="14" height="20" rx="2" fill="#D0D5DD" stroke="#2C3E50" stroke-width="1"/>
  <!-- Eyelets -->
  <circle cx="150" cy="230" r="3" stroke="#2C3E50" stroke-width="1.5" fill="none"/>
  <circle cx="250" cy="230" r="3" stroke="#2C3E50" stroke-width="1.5" fill="none"/>
  <!-- Print area -->
  <rect x="165" y="245" width="70" height="45" rx="6" fill="#E8ECF0" stroke="#D0D5DD" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="200" y="273" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#98A2B3">Design</text>
  <text x="200" y="480" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#475467" font-weight="600">Richardson 113</text>
</svg>
