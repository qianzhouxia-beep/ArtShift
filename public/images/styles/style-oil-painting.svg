<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="oilGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="30%" style="stop-color:#D2691E"/>
      <stop offset="50%" style="stop-color:#F4A460"/>
      <stop offset="70%" style="stop-color:#CD853F"/>
      <stop offset="100%" style="stop-color:#5D3A1A"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#oilGrad)"/>
  <!-- Texture strokes -->
  <g opacity="0.3">
    <rect x="20" y="30" width="120" height="8" rx="4" fill="#DEB887" transform="rotate(-15 80 34)"/>
    <rect x="150" y="60" width="100" height="6" rx="3" fill="#D2B48C" transform="rotate(10 200 63)"/>
    <rect x="300" y="20" width="140" height="7" rx="3.5" fill="#C4A882" transform="rotate(-8 370 23)"/>
    <rect x="50" y="120" width="90" height="5" rx="2.5" fill="#B8860B" transform="rotate(20 95 122)"/>
    <rect x="350" y="130" width="110" height="6" rx="3" fill="#DAA520" transform="rotate(-25 405 133)"/>
    <rect x="180" y="180" width="130" height="8" rx="4" fill="#B8860B" transform="rotate(5 245 184)"/>
  </g>
  <!-- Subject -->
  <circle cx="256" cy="220" r="60" fill="none" stroke="#DAA520" stroke-width="2" opacity="0.5"/>
  <ellipse cx="256" cy="280" rx="80" ry="40" fill="none" stroke="#DAA520" stroke-width="1.5" opacity="0.3"/>
  <!-- Paint splatter -->
  <circle cx="200" cy="170" r="3" fill="#FFD700" opacity="0.4"/>
  <circle cx="310" cy="250" r="2.5" fill="#FFA500" opacity="0.3"/>
  <circle cx="180" cy="300" r="2" fill="#CD853F" opacity="0.4"/>
  <text x="256" y="400" text-anchor="middle" fill="#FFF8DC" font-family="serif" font-size="20">Oil Painting</text>
</svg>
