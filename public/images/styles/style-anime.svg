<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="animeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="50%" style="stop-color:#e1f5fe"/>
      <stop offset="100%" style="stop-color:#f3e5f5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#animeBg)"/>
  <!-- Cherry blossoms -->
  <g fill="#ff8a80" opacity="0.6">
    <circle cx="100" cy="120" r="8"/><circle cx="106" cy="114" r="6"/>
    <circle cx="94" cy="114" r="6"/><circle cx="100" cy="108" r="5"/>
    <circle cx="380" cy="180" r="6"/><circle cx="385" cy="175" r="5"/>
    <circle cx="375" cy="175" r="5"/><circle cx="380" cy="170" r="4"/>
    <circle cx="320" cy="380" r="7"/><circle cx="326" cy="374" r="5"/>
    <circle cx="314" cy="374" r="5"/><circle cx="320" cy="369" r="4.5"/>
    <circle cx="150" cy="350" r="5"/><circle cx="155" cy="346" r="4"/>
    <circle cx="145" cy="346" r="4"/><circle cx="150" cy="342" r="3"/>
  </g>
  <!-- Sparkles -->
  <g fill="#ffd54f" opacity="0.5">
    <polygon points="380,120 383,128 391,128 385,133 387,141 380,136 373,141 375,133 369,128 377,128"/>
    <polygon points="150,250 152,256 158,256 153,260 155,266 150,262 145,266 147,260 142,256 148,256" transform="scale(0.7) translate(60,80)"/>
  </g>
  <!-- Moon -->
  <circle cx="370" cy="100" r="40" fill="#fff9c4" opacity="0.8"/>
  <circle cx="382" cy="92" r="32" fill="url(#animeBg)" opacity="0.7"/>
  <!-- Stars -->
  <g fill="#fff" opacity="0.7">
    <circle cx="60" cy="80" r="2"/><circle cx="200" cy="50" r="1.5"/>
    <circle cx="450" cy="60" r="2"/><circle cx="300" cy="90" r="1"/>
    <circle cx="80" cy="200" r="1.5"/><circle cx="420" cy="200" r="1"/>
  </g>
  <text x="256" y="400" text-anchor="middle" fill="#e91e63" font-family="cursive, sans-serif" font-size="22">Anime</text>
</svg>
