<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArtShift - Pixel Particles Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #ffffff; 
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    canvas { 
      display: block; 
      position: fixed;
      top: 0;
      left: 0;
    }
    .overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #1f2937;
      z-index: 10;
      pointer-events: none;
    }
    .overlay h1 {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #8B5CF6, #3B82F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .overlay p {
      font-size: 1.2rem;
      color: #6b7280;
    }
    .hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: #9ca3af;
      font-size: 0.9rem;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="overlay">
    <h1>ArtShift</h1>
    <p>AI Art Style Transfer · Print on Anything</p>
  </div>
  
  <div class="hint">移动鼠标和粒子互动 ✨</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    const mouse = { x: width / 2, y: height / 2 };
    const particles = [];
    const PARTICLE_COUNT = 60;

    // Track mouse position
    document.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    // Particle class
    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 20 + 10; // 10-30px
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.4 + 0.6; // 0.6-1.0 (more opaque for white bg)
        this.pulse = Math.random() * Math.PI * 2; // For pulsing effect
        
        // Purple to blue gradient colors (more saturated for white bg)
        this.color1 = `rgba(139, 92, 246, ${this.opacity})`; // #8B5CF6
        this.color2 = `rgba(59, 130, 246, ${this.opacity})`; // #3B82F6
      }

      update() {
        // Gentle floating
        this.x += this.speedX;
        this.y += this.speedY;

        // Mouse interaction (repel)
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const repelRadius = 150;

        if (distance < repelRadius) {
          const force = (repelRadius - distance) / repelRadius;
          this.x -= (dx / distance) * force * 3;
          this.y -= (dy / distance) * force * 3;
        }

        // Wrap around edges
        if (this.x < -this.size) this.x = width + this.size;
        if (this.x > width + this.size) this.x = -this.size;
        if (this.y < -this.size) this.y = height + this.size;
        if (this.y > height + this.size) this.y = -this.size;

        // Pulsing effect
        this.pulse += 0.02;
        this.currentSize = this.size + Math.sin(this.pulse) * 2;
      }

      draw() {
        // Create gradient for each particle
        const gradient = ctx.createLinearGradient(
          this.x, this.y, 
          this.x + this.currentSize, this.y + this.currentSize
        );
        gradient.addColorStop(0, `rgba(139, 92, 246, ${this.opacity})`);
        gradient.addColorStop(1, `rgba(59, 130, 246, ${this.opacity})`);

        ctx.fillStyle = gradient;
        
        // Draw rounded rectangle (pixel block)
        const radius = 4;
        ctx.beginPath();
        ctx.moveTo(this.x + radius, this.y);
        ctx.lineTo(this.x + this.currentSize - radius, this.y);
        ctx.quadraticCurveTo(this.x + this.currentSize, this.y, this.x + this.currentSize, this.y + radius);
        ctx.lineTo(this.x + this.currentSize, this.y + this.currentSize - radius);
        ctx.quadraticCurveTo(this.x + this.currentSize, this.y + this.currentSize, this.x + this.currentSize - radius, this.y + this.currentSize);
        ctx.lineTo(this.x + radius, this.y + this.currentSize);
        ctx.quadraticCurveTo(this.x, this.y + this.currentSize, this.x, this.y + this.currentSize - radius);
        ctx.lineTo(this.x, this.y + radius);
        ctx.quadraticCurveTo(this.x, this.y, this.x + radius, this.y);
        ctx.closePath();
        ctx.fill();
      }
    }

    // Initialize particles
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }

    // Animation loop
    function animate() {
      // Fade effect (white overlay for trail on white bg)
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.fillRect(0, 0, width, height);

      // Update and draw particles
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();

    // Handle resize
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
